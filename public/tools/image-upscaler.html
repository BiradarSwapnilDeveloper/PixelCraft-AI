  <div class="tool-page-header">

    <p>Enhance and upscale low resolution images using smart interpolation. Up to 4x enlargement.</p>
  </div>
  <div class="tool-workspace">
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" style="display:none"/>
      <div class="upload-icon">🔍</div>
      <h3>Upload a low-resolution image</h3>
      <p>PNG, JPG, WebP — Best for images under 600px</p>
    </div>
    <div id="editor" style="display:none;">
      <div class="result-area show" style="margin-top:0;">
        <div class="result-header">
          <span class="result-header-title">🔍 Upscale Settings</span>
          <div style="display:flex;gap:10px;">
            <button class="btn btn-gray" onclick="resetTool()">🔄 New Image</button>
            <button class="btn btn-green" id="btn-download" style="display:none;">⬇️ Download</button>
          </div>
        </div>
        <div class="result-body">
          <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
            <button class="scale-btn btn btn-outline active-scale" data-scale="2">2x Upscale</button>
            <button class="scale-btn btn btn-outline" data-scale="3">3x Upscale</button>
            <button class="scale-btn btn btn-outline" data-scale="4">4x Upscale</button>
          </div>
          <div id="info-row" style="background:var(--bg);border-radius:10px;padding:16px;margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap;"></div>
          <button class="btn btn-blue" id="btn-upscale" style="margin-bottom:20px;justify-content:center;">🔍 Upscale Now</button>
          <div id="processing" style="display:none;" class="loader-wrap"><div class="loader"></div><p>Upscaling...</p></div>
          <div class="before-after" id="result-area" style="display:none;">
            <div><label>Original</label><canvas id="orig-canvas"></canvas></div>
            <div><label>Upscaled</label><canvas id="result-canvas"></canvas></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../js/utils.js"></script>
<script>
let currentImg = null, selectedScale = 2;
const fileInput = document.getElementById('file-input');
const uploadArea = document.getElementById('upload-area');
const editor = document.getElementById('editor');
const origCanvas = document.getElementById('orig-canvas');
const resultCanvas = document.getElementById('result-canvas');

setupDragDrop(uploadArea, handleFile);
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

document.querySelectorAll('.scale-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.scale-btn').forEach(b => b.className='scale-btn btn btn-outline');
    btn.className='scale-btn btn btn-blue active-scale';
    selectedScale = parseInt(btn.dataset.scale);
    updateInfo();
  });
});

async function handleFile(file) {
  currentImg = await fileToImage(file);
  drawImageToCanvas(origCanvas, currentImg, 400, 300);
  uploadArea.style.display = 'none';
  editor.style.display = 'block';
  updateInfo();
}

function updateInfo() {
  if (!currentImg) return;
  document.getElementById('info-row').innerHTML = `
    <div><span style="color:var(--text-light);font-size:0.82rem;">Original Size</span><br/><strong style="color:var(--dark);">${currentImg.naturalWidth} × ${currentImg.naturalHeight}px</strong></div>
    <div style="font-size:1.2rem;padding-top:8px;">→</div>
    <div><span style="color:var(--text-light);font-size:0.82rem;">Upscaled Size (${selectedScale}x)</span><br/><strong style="color:var(--success);">${currentImg.naturalWidth * selectedScale} × ${currentImg.naturalHeight * selectedScale}px</strong></div>
  `;
}

document.getElementById('btn-upscale').addEventListener('click', upscale);

async function upscale() {
  if (!currentImg) return;
  document.getElementById('btn-upscale').style.display = 'none';
  document.getElementById('processing').style.display = 'flex';

  await new Promise(resolve => setTimeout(resolve, 100)); // let UI update

  const newW = currentImg.naturalWidth * selectedScale;
  const newH = currentImg.naturalHeight * selectedScale;
  resultCanvas.width = Math.min(newW, 4000);
  resultCanvas.height = Math.min(newH, 4000);
  const ctx = resultCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(currentImg, 0, 0, resultCanvas.width, resultCanvas.height);

  // Apply slight sharpening after upscale
  const imgData = ctx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
  const sharpened = applyLightSharpen(imgData, resultCanvas.width, resultCanvas.height);
  ctx.putImageData(sharpened, 0, 0);

  document.getElementById('processing').style.display = 'none';
  document.getElementById('result-area').style.display = 'grid';
  document.getElementById('btn-download').style.display = 'flex';
  showToast(`Upscaled to ${resultCanvas.width}×${resultCanvas.height}px!`, 'success');
}

function applyLightSharpen(imgData, w, h) {
  const kernel = [0,-0.3,0,-0.3,2.2,-0.3,0,-0.3,0];
  const src = new Uint8ClampedArray(imgData.data);
  const dst = imgData.data;
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const i = (y*w+x)*4;
      for (let c = 0; c < 3; c++) {
        let v = 0;
        for (let ky=-1;ky<=1;ky++) for(let kx=-1;kx<=1;kx++) {
          v += src[((y+ky)*w+(x+kx))*4+c] * kernel[(ky+1)*3+(kx+1)];
        }
        dst[i+c] = Math.max(0,Math.min(255,v));
      }
    }
  }
  return imgData;
}

document.getElementById('btn-download').addEventListener('click', () => {
  downloadFile(resultCanvas.toDataURL('image/png'), `pixelcraft-upscaled-${selectedScale}x.png`);
});

function resetTool() {
  currentImg = null;
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('btn-download').style.display = 'none';
  document.getElementById('btn-upscale').style.display = 'flex';
  uploadArea.style.display = 'block'; editor.style.display = 'none'; fileInput.value = '';
}
</script>
